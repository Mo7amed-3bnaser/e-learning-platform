name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes (more aggressive)
  workflow_dispatch:         # Allow manual trigger

jobs:
  ping:
    name: Ping Frontend & Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Backend
        run: |
          echo "Pinging Backend..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://masar-back.onrender.com)
            echo "Attempt $i - Backend status: $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Backend is alive!"
              break
            fi
            sleep 10
          done

      - name: Ping Frontend
        run: |
          echo "Pinging Frontend..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://masar-zsel.onrender.com/)
            echo "Attempt $i - Frontend status: $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Frontend is alive!"
              break
            fi
            sleep 10
          done
